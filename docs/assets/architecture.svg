<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="100%" role="img" aria-label="Architecture: the job CLI, jobd-mcp MCP tools, and HTTP/SSE clients talk to the jobd broker (FastAPI: queue, VRAM matcher, priorities and preemption, backed by SQLite, events.jsonl and /metrics), which dispatches over long-poll claims and heartbeats to worker A (24 GB GPU), worker B (8 GB GPU), and worker C (CPU-only), all inside one tailnet.">
  <!-- Hand-authored, self-contained dark card (same palette as demo.svg's
       terminal window): plain SVG text only — no foreignObject — so it renders
       identically on GitHub light/dark, PyPI, and anything that treats SVG as
       a static image. -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8b949e"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#3fb950"/>
    </marker>
  </defs>

  <style>
    text { font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, Consolas, monospace; fill: #e6edf3; }
    .dim   { fill: #8b949e; }
    .accent{ fill: #58a6ff; }
    .green { fill: #3fb950; }
    .s12 { font-size: 12px; }
    .s13 { font-size: 13px; }
    .s15 { font-size: 15px; font-weight: 600; }
    .box   { fill: #21262d; stroke: #444c56; stroke-width: 1.2; }
    .chip  { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .edge  { stroke: #8b949e; stroke-width: 1.4; fill: none; }
    .edgeG { stroke: #3fb950; stroke-width: 1.4; fill: none; }
  </style>

  <!-- card -->
  <rect x="1" y="1" width="758" height="458" rx="10" fill="#282d35" stroke="#444c56" stroke-width="1.5"/>
  <!-- tailnet boundary -->
  <rect x="22" y="20" width="716" height="420" rx="12" fill="none" stroke="#58a6ff" stroke-width="1" stroke-dasharray="5 5" opacity="0.55"/>
  <text x="40" y="42" class="s12 accent" opacity="0.9">tailnet · shared bearer token · source-IP ACL</text>

  <!-- clients row -->
  <g>
    <rect x="60"  y="62" width="180" height="52" rx="8" class="box"/>
    <text x="150" y="84"  text-anchor="middle" class="s15">job</text>
    <text x="150" y="103" text-anchor="middle" class="s12 dim">CLI · submit / list / logs</text>

    <rect x="290" y="62" width="180" height="52" rx="8" class="box"/>
    <text x="380" y="84"  text-anchor="middle" class="s15">jobd-mcp</text>
    <text x="380" y="103" text-anchor="middle" class="s12 dim">MCP tools · LLM agents</text>

    <rect x="520" y="62" width="180" height="52" rx="8" class="box"/>
    <text x="610" y="84"  text-anchor="middle" class="s15">HTTP / SSE</text>
    <text x="610" y="103" text-anchor="middle" class="s12 dim">hooks · scripts · /wait</text>
  </g>

  <line x1="150" y1="114" x2="150" y2="160" class="edge" marker-end="url(#arrow)"/>
  <line x1="380" y1="114" x2="380" y2="160" class="edge" marker-end="url(#arrow)"/>
  <line x1="610" y1="114" x2="610" y2="160" class="edge" marker-end="url(#arrow)"/>

  <!-- broker -->
  <g>
    <rect x="60" y="164" width="640" height="112" rx="10" fill="#21262d" stroke="#58a6ff" stroke-width="1.6"/>
    <text x="380" y="192" text-anchor="middle" class="s15">jobd broker</text>
    <text x="380" y="214" text-anchor="middle" class="s13 dim">FastAPI · queue · VRAM-fit matcher · priorities · preemption · cascade</text>

    <rect x="187" y="230" width="100" height="26" rx="13" class="chip"/>
    <text x="237" y="247" text-anchor="middle" class="s12 dim">SQLite</text>
    <rect x="307" y="230" width="130" height="26" rx="13" class="chip"/>
    <text x="372" y="247" text-anchor="middle" class="s12 dim">events.jsonl</text>
    <rect x="457" y="230" width="116" height="26" rx="13" class="chip"/>
    <text x="515" y="247" text-anchor="middle" class="s12 dim">/metrics</text>
  </g>

  <!-- dispatch edges -->
  <line x1="170" y1="276" x2="170" y2="330" class="edgeG" marker-start="url(#arrowAccent)" marker-end="url(#arrowAccent)"/>
  <line x1="380" y1="276" x2="380" y2="330" class="edgeG" marker-start="url(#arrowAccent)" marker-end="url(#arrowAccent)"/>
  <line x1="590" y1="276" x2="590" y2="330" class="edgeG" marker-start="url(#arrowAccent)" marker-end="url(#arrowAccent)"/>
  <text x="380" y="312" text-anchor="middle" class="s12 green" opacity="0.9">long-poll claim · heartbeat · self-updating CD</text>

  <!-- workers row -->
  <g>
    <rect x="75"  y="334" width="190" height="74" rx="8" class="box"/>
    <text x="170" y="358" text-anchor="middle" class="s15">worker A</text>
    <text x="170" y="378" text-anchor="middle" class="s12 green">GPU · 24 GB VRAM</text>
    <text x="170" y="396" text-anchor="middle" class="s12 dim">systemd scopes · watchdogs</text>

    <rect x="285" y="334" width="190" height="74" rx="8" class="box"/>
    <text x="380" y="358" text-anchor="middle" class="s15">worker B</text>
    <text x="380" y="378" text-anchor="middle" class="s12 green">GPU · 8 GB VRAM</text>
    <text x="380" y="396" text-anchor="middle" class="s12 dim">checkpoint / preempt</text>

    <rect x="495" y="334" width="190" height="74" rx="8" class="box"/>
    <text x="590" y="358" text-anchor="middle" class="s15">worker C</text>
    <text x="590" y="378" text-anchor="middle" class="s12 dim">CPU-only</text>
    <text x="590" y="396" text-anchor="middle" class="s12 dim">tags · mount roots</text>
  </g>
</svg>
