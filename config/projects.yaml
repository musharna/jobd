# Per-project priority table. Higher priority wins when the queue is contended.
# This file is OPTIONAL — with no projects.yaml the broker uses the global
# default priority for every job. Edit freely for your own projects.
#
# Change priorities live (persists + reloads) with:
#   job projects set NAME PRIORITY
projects:
  # Tier 1 — time-sensitive / blocking work
  project-a: { priority: 80 }
  project-b: { priority: 75 }

  # Tier 2 — active development
  project-c:
    priority: 60
    defaults:
      # Per-project submit defaults. preemptible=true lets a higher-priority
      # job pause this one (the worker is sent SIGTERM, then SIGKILL after the
      # grace window) — only safe for jobs that checkpoint. See docs/preemption.md.
      preemptible: true
      checkpoint_grace_s: 60

  # Tier 3 — background / best-effort
  project-d: { priority: 40 }

  # Priority applied to any project not listed above. The defaults below are the
  # FLEET-WIDE hang-guard: any unlisted project inherits them. idle_timeout_s
  # reaps a job that emits NO output for 1h and frees its worker slot — this
  # prevents D-state/9p-stall zombies (a real incident: a silent job held a
  # desktop GPU slot for 6 days). 1h is generous: a true hang is silent forever
  # so it is caught regardless, while a healthy job printing periodic progress is
  # never killed. A legitimately-silent long job should emit a heartbeat, or set
  # a larger per-project idle_timeout_s.
  #
  # This lived only as an uncommitted edit on the gt76 broker until 2026-07-12 —
  # i.e. one `git clone` away from being silently lost. It is config-as-code, so
  # it belongs here.
  _default:
    priority: 40
    defaults:
      idle_timeout_s: 3600 # 1h with no stdout -> reap + free the slot
      max_wall_s: 172800 # 48h hard runaway ceiling
