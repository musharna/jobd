name: Publish to MCP Registry
# Submits server.json to the official MCP registry via GitHub Actions OIDC
# (mcp-publisher login github-oidc) — no device flow, no stored credentials.
# The OIDC token's repository_owner ("musharna") grants the io.github.musharna/*
# namespace.
#
# Triggered by the `vX.Y.Z` tag push (the same event that fires release.yml) —
# NOT by `release: published`. A GitHub release created by release.yml runs as
# the default GITHUB_TOKEN, and GitHub suppresses workflow triggers from events
# raised by GITHUB_TOKEN (recursion prevention), so a `release: published`
# trigger here would silently never fire. The tag push is a real user push and
# does trigger workflows. The wait-for-PyPI step below handles the race with
# release.yml's parallel PyPI upload. workflow_dispatch stays for backfills.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  registry-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for mcp-publisher login github-oidc
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Wait for the PyPI release to be queryable
        # release.yml uploads to PyPI in a parallel run; the registry validates
        # the PyPI package + its mcp-name marker, so block until it is live.
        run: |
          VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          # 10 minutes: release.yml's PyPI job runs in the `pypi` environment,
          # so a slow upload (or a future required reviewer on that
          # environment) must not fail this run after the tag is already cut.
          for i in $(seq 1 60); do
            if curl -fsSL "https://pypi.org/pypi/jobd/$VER/json" >/dev/null; then
              echo "PyPI $VER is live"; exit 0
            fi
            echo "waiting for PyPI $VER ($i/60)"; sleep 10
          done
          echo "PyPI $VER did not appear within 10 minutes"; exit 1
      - name: Install mcp-publisher
        # Pinned by tag AND sha256: release tags/assets are mutable (unlike the
        # SHA-pinned actions elsewhere in these workflows), so verify the
        # digest before executing the binary. Recompute when bumping the
        # version: curl -fsSL <url> | sha256sum
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz" -o mcp-publisher.tar.gz
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
      - name: Log in to the MCP registry via GitHub Actions OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
