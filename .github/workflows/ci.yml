name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies (from lockfile)
        run: uv sync --frozen --python ${{ matrix.python-version }} --extra dev --extra worker --extra mcp

      - name: Lint (ruff)
        run: uv run ruff check .

      # Shell scripts get the same lint gate as Python (ubuntu runners ship
      # shellcheck). Caught-in-the-wild class: an un-timeouted probe of a
      # stdio binary hanging scripts/fix-cli-shims.sh.
      - name: Lint (shellcheck)
        run: shellcheck scripts/*.sh

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Tests (excluding live broker)
        if: matrix.python-version != '3.12'
        run: uv run pytest -m "not live" -q

      # One matrix leg also enforces a coverage floor (term-missing report,
      # no external uploader). Measured ~85% at the time this gate landed.
      - name: Tests with coverage gate (excluding live broker)
        if: matrix.python-version == '3.12'
        run: uv run pytest -m "not live" -q --cov=src/jobd --cov=src/job_cli --cov-report=term-missing --cov-fail-under=82

      # mypy is clean and now gates the build: type regressions fail CI.
      - name: Types (mypy)
        run: uv run mypy src/jobd src/job_cli

  # H-3 (audit 2026-07-10): gate the real 2-process worker<->broker suite on
  # every merge. The `test` job above runs `-m "not live"`, so the live HTTP +
  # concurrent-CAS-contention tests — the only coverage that exercises real
  # broker<->worker interleavings rather than single-threaded monkeypatch
  # simulations — never gated CI. H-1/H-2 shipped precisely because that path
  # was untested-on-merge. pytest-timeout bounds any hung subprocess/socket.
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies (from lockfile)
        run: uv sync --frozen --python 3.12 --extra dev --extra worker --extra mcp

      - name: Live worker<->broker suite
        env:
          JOBD_LIVE: "1"
        run: uv run pytest -m live -q
