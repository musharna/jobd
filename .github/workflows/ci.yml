name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Install dependencies (from lockfile)
        run: uv sync --frozen --python ${{ matrix.python-version }} --extra dev --extra worker --extra mcp

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Tests (excluding live broker)
        run: uv run pytest -m "not live" -q

      # mypy is clean and now gates the build: type regressions fail CI.
      - name: Types (mypy)
        run: uv run mypy src/jobd src/job_cli
