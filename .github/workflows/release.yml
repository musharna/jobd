name: Release

# Tag-driven release: push a `vX.Y.Z` tag and this builds, publishes to PyPI
# via Trusted Publishing (OIDC — no API token stored anywhere), and cuts a
# GitHub release with the artifacts attached.
#
#   git tag v0.1.1 && git push origin v0.1.1
#
# One-time setup required on PyPI: project `jobd` → Settings → Publishing →
# add a GitHub Actions trusted publisher (owner=musharna, repo=jobd,
# workflow=release.yml, environment=pypi). And create a GitHub environment
# named `pypi` (Settings → Environments).

on:
  push:
    tags: ["v*"]

env:
  # See ci.yml: `uv run` re-locks a stale lockfile unless told not to, which
  # would let the test gate below test something other than the committed lock.
  UV_NO_SYNC: "1"

jobs:
  # Audit 2026-07-15 T-2: without this, a tag pushed against a pyproject that
  # still carries the PREVIOUS version publishes a ghcr image whose name lies
  # about its contents — a poisoned rollback target that sits in the registry
  # forever. (publish-image.yml has always had this check; the main release
  # path did not.) Both publishers gate on it.
  verify:
    name: Tag matches pyproject version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify tag == pyproject version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          if [ "$VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != pyproject version ${PYPROJECT_VERSION} — refusing to publish a mislabeled artifact"
            exit 1
          fi

  # Audit 2026-07-15: the release pipeline never ran a single test — a tag on a
  # commit CI never saw (pushed straight to main, or tagged mid-red) released
  # blind. One lean leg here; the full matrix still runs on PRs.
  test:
    name: Test the tagged commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Install dependencies (from lockfile)
        run: uv sync --frozen --python 3.12 --extra dev --extra worker --extra mcp
      - name: Tests (excluding live broker)
        run: uv run pytest -m "not live" -q

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build sdist + wheel
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing; no password/token needed
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  docker:
    name: Publish container image to GHCR
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io/musharna/jobd
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          # vX.Y.Z -> both the exact version and `latest`. The deploy on gt76 pins the
          # exact version (see scripts/deploy-broker.sh); `latest` is a convenience for
          # humans and MUST NOT be what production follows.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Provenance attestations ON (audit 2026-07-15 Sec-C): the deploy
          # pulls by mutable tag from an automated timer; the attestation is
          # the counter-signal that lets a pulled image be traced back to the
          # workflow run that built it.
          provenance: true

  github-release:
    name: Create GitHub release
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (for CHANGELOG.md)
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prefer the matching CHANGELOG.md section as release notes; fall back
          # to GitHub's auto-generated notes if the version has no section.
          VER="${GITHUB_REF_NAME#v}"
          awk -v h="## [$VER]" '
            index($0, h) == 1 { grab = 1; next }
            grab && index($0, "## ") == 1 { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if grep -q '[^[:space:]]' release-notes.md; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              dist/*
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              dist/*
          fi
