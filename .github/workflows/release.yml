name: Release

# Tag-driven release: push a `vX.Y.Z` tag and this builds, publishes to PyPI
# via Trusted Publishing (OIDC — no API token stored anywhere), and cuts a
# GitHub release with the artifacts attached.
#
#   git tag v0.1.1 && git push origin v0.1.1
#
# One-time setup required on PyPI: project `jobd` → Settings → Publishing →
# add a GitHub Actions trusted publisher (owner=musharna, repo=jobd,
# workflow=release.yml, environment=pypi). And create a GitHub environment
# named `pypi` (Settings → Environments).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build sdist + wheel
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing; no password/token needed
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  docker:
    name: Publish container image to GHCR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io/musharna/jobd
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          # vX.Y.Z -> both the exact version and `latest`. The deploy on gt76 pins the
          # exact version (see scripts/deploy-broker.sh); `latest` is a convenience for
          # humans and MUST NOT be what production follows.
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  github-release:
    name: Create GitHub release
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 (for CHANGELOG.md)
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Prefer the matching CHANGELOG.md section as release notes; fall back
          # to GitHub's auto-generated notes if the version has no section.
          VER="${GITHUB_REF_NAME#v}"
          awk -v h="## [$VER]" '
            index($0, h) == 1 { grab = 1; next }
            grab && index($0, "## ") == 1 { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if grep -q '[^[:space:]]' release-notes.md; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              dist/*
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              dist/*
          fi
